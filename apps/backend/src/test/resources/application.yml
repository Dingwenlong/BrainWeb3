spring:
  datasource:
    url: jdbc:h2:mem:brainweb3;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

brainweb3:
  stage: test
  auth:
    jwt-secret: test-brainweb3-demo-jwt-secret-2026-04-21
    token-ttl-hours: 12
    demo-password: brainweb3-demo
    allow-demo-bootstrap: true
    allow-demo-password-login: true
  demo:
    sample-root: .brainweb3-test-samples
  chain:
    enabled: false
  storage:
    provider: local
