name: ci

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test backend
        run: mvn -pl apps/backend test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build:frontend

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/eeg-service
          - services/federated-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r ${{ matrix.service }}/requirements.txt
      - name: Run tests
        run: python -m pytest ${{ matrix.service }}/tests
