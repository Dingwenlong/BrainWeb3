name: ci

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test backend
        run: mvn -B -ntp -pl apps/backend test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify frontend and contracts
        run: npm run verify:ci

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/eeg-service
          - services/federated-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r ${{ matrix.service }}/requirements.txt
      - name: Run tests
        run: python -m pytest ${{ matrix.service }}/tests -q
